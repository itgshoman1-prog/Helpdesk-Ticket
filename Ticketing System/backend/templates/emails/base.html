<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header { background: #1e3a5f; color: white; padding: 24px 32px; }
  .header h1 { margin: 0; font-size: 20px; }
  .header p { margin: 4px 0 0; font-size: 13px; opacity: 0.8; }
  .body { padding: 32px; color: #333; }
  .ticket-box { background: #f8f9fa; border-left: 4px solid #1e3a5f; padding: 16px; margin: 20px 0; border-radius: 4px; }
  .ticket-box p { margin: 4px 0; font-size: 14px; }
  .ticket-box strong { color: #1e3a5f; }
  .btn { display: inline-block; margin: 20px 0; padding: 12px 28px; background: #1e3a5f; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
  .footer { background: #f4f4f4; padding: 16px 32px; font-size: 12px; color: #888; text-align: center; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
  .badge-critical { background: #fee2e2; color: #b91c1c; }
  .badge-high { background: #ffedd5; color: #c2410c; }
  .badge-medium { background: #fef9c3; color: #a16207; }
  .badge-low { background: #dcfce7; color: #166534; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Helpdesk & Ticketing System</h1>
    <p>Support Portal Notification</p>
  </div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    This is an automated notification. Please do not reply to this email.<br>
    To view your ticket, visit <a href="{{ frontend_url }}">the support portal</a>.
  </div>
</div>
</body>
</html>
